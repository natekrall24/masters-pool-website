<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}2026 Slot Masters Pool{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='masters-logo-freelogovectors.net_.png') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title"><a href="/">2026 Slot Masters Pool</a></h1>
            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/lineups">Lineups</a>
                <a href="/leaderboard">Leaderboard</a>
                <a href="/champions">Champions</a>
            </nav>
        </div>
    </header>

    <main class="site-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>Questions? Email <a href="mailto:sammymarks03@gmail.com">sammymarks03@gmail.com</a></p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
